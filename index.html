<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Picker Service</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: transparent; color: #555;
        }
        #status-container { text-align: center; background: rgba(255,255,255,0.95); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-text { font-size: 16px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="status-container">
    <div id="loader-icon" class="loader"></div>
    <div id="status-text">初始化 Google 服务...</div>
</div>

<script>
    // 【核心配置区】
    const apiKey = 'AIzaSyCLwRV2izMLsSIa9zAZ06T5FqR0-5RuExE'; 
    const clientId = '741813112780-jimvtogafodjc5egg35ejgf8qbr60rjq.apps.googleusercontent.com';
    
    let isPickerApiLoaded = false;

    // 页面加载后立即尝试预加载组件，减少 Android 调用时的等待
    window.onload = function() {
        loadPickerComponent();
    };

    function loadPickerComponent() {
        if (typeof gapi === 'undefined') {
            updateStatus("Google JS 库加载失败，请检查网络或代理设置");
            return;
        }

        // 【关键修复】：必须成对提供 timeout 和 ontimeout，防止 Line 24 报错
        gapi.load('picker', {
            callback: () => {
                console.log("Picker API Ready");
                isPickerApiLoaded = true;
                updateStatus("服务已准备就绪");
                document.getElementById('loader-icon').style.display = 'none';
            },
            onerror: () => {
                updateStatus("Google 组件加载异常");
            },
            timeout: 20000, // 20秒宽限期，应对下午的网络波动
            ontimeout: () => {
                updateStatus("连接 Google 超时，请确认网络加速环境是否有效");
                console.error("GAPI Load Timeout triggered");
            }
        });
    }

    /**
     * 由 Android Java 端通过 webView.loadUrl 调用
     */
    window.initPicker = function(token, mimeType) {
        console.log("Android 调用 initPicker, Token 长度: " + (token ? token.length : 0));
        
        if (!isPickerApiLoaded) {
            updateStatus("正在重新尝试拉起服务...");
            loadPickerComponent();
            // 稍作延迟等待重试
            setTimeout(() => { if(isPickerApiLoaded) createPicker(token, mimeType); }, 1500);
            return;
        }
        createPicker(token, mimeType);
    };

    function createPicker(token, mimeType) {
        try {
            updateStatus("正在唤起 Google Drive 选择器...");
            const view = new google.picker.View(google.picker.ViewId.DOCS);
            
            // MimeType 过滤逻辑
            if (mimeType === 'pdf') {
                view.setMimeTypes("application/pdf");
            } else if (mimeType === 'jpg' || mimeType === 'image') {
                view.setMimeTypes("image/jpeg,image/png,image/webp");
            }

            // 【关键】：显式指定 Origin，必须与 Google Cloud Console 配置完全一致
            const origin = window.location.protocol + "//" + window.location.host;

            const picker = new google.picker.PickerBuilder()
                .addView(view)
                .setOAuthToken(token)
                .setDeveloperKey(apiKey)
                .setAppId(clientId.split("-")[0])
                .setOrigin(origin) 
                .setCallback(pickerCallback)
                .build();

            picker.setVisible(true);
            
            // 成功弹出后，3秒后清空提示文字，保持 UI 整洁
            setTimeout(() => updateStatus(""), 3000);
        } catch (e) {
            updateStatus("构建失败: " + e.message);
            console.error("Picker Build Error:", e);
        }
    }

    function pickerCallback(data) {
        if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            // 传回 Android 原生端
            if (window.AndroidBridge) {
                window.AndroidBridge.onFilePicked(doc.id, doc.name);
            }
        } else if (data.action === google.picker.Action.CANCEL) {
            if (window.AndroidBridge) window.AndroidBridge.onCancel();
        }
    }

    function updateStatus(msg) {
        document.getElementById('status-text').innerText = msg;
    }
</script>
</body>
</html>
