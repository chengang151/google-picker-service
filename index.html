<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Google Drive Picker</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // 【配置区】把这两个值换成你在控制台看到的
        const apiKey = 'AIzaSyCLwRV2izMLsSIa9zAZ06T5FqR0-5RuExE'; 
        const clientId = '741813112780-jimvtogafodjc5egg35ejgf8qbr60rjq.apps.googleusercontent.com'; // 从 OAuth 2.0 Web 客户端复制

        // 这个函数会被 Android 端调用
        function initPicker(token, mimeType) {
            gapi.load('picker', () => {
                const view = new google.picker.View(google.picker.ViewId.DOCS);
                
                // 动态过滤文件类型
                if (mimeType === 'pdf') {
                    view.setMimeTypes("application/pdf");
                } else if (mimeType === 'jpg') {
                    view.setMimeTypes("image/jpeg,image/png");
                }

                const picker = new google.picker.PickerBuilder()
                    .addView(view)
                    .setOAuthToken(token)
                    .setDeveloperKey(apiKey)
                    .setAppId(clientId.split("-")[0]) // 自动从 Client ID 提取 App ID
                    .setCallback(pickerCallback)
                    .build();
                picker.setVisible(true);
            });
        }

        // 处理用户选择结果
        function pickerCallback(data) {
            if (data.action === google.picker.Action.PICKED) {
                const doc = data.docs[0];
                const fileId = doc.id;
                const fileName = doc.name;

                // 【核心】传回给 Android 原生 Java
                if (window.AndroidBridge) {
                    window.AndroidBridge.onFilePicked(fileId, fileName);
                }
            } else if (data.action === google.picker.Action.CANCEL) {
                if (window.AndroidBridge) window.AndroidBridge.onCancel();
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: transparent; }
    </style>
</head>
<body>
    </body>
</html>
